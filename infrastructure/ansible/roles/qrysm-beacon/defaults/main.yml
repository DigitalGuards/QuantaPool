---
# qrysm beacon node defaults

# Version and source
qrysm_version: "latest"
qrysm_repo: "https://github.com/theQRL/qrysm"
qrysm_beacon_binary_path: "/usr/local/bin/qrysm-beacon"
staking_deposit_cli_binary_path: "/usr/local/bin/staking-deposit-cli"

# Data directories
qrysm_beacon_data_dir: "/var/lib/qrysm/beacon"
qrysm_user: "qrysm"
qrysm_group: "qrysm"

# Network configuration
qrysm_network: "testnet"
qrysm_p2p_port: 13000
qrysm_p2p_udp_port: 12000
qrysm_grpc_port: 4000
qrysm_grpc_gateway_port: 3500
qrysm_rpc_port: 4001

# Execution client connection
gqrl_authrpc_addr: "127.0.0.1"
gqrl_authrpc_port: 8551
jwt_secret_path: "/etc/quantapool/jwt.hex"

# P2P settings
qrysm_p2p_max_peers: 45
qrysm_min_sync_peers: 1

# Metrics
# Manual host binds to 172.18.0.1 (docker bridge). In ansible we bind 0.0.0.0
# since there's no docker bridge and the firewall does not expose the port.
qrysm_metrics_enabled: true
qrysm_metrics_port: 8080
qrysm_metrics_addr: "0.0.0.0"

# gRPC / REST settings (match manual host)
qrysm_rpc_host: "127.0.0.1"
qrysm_grpc_gateway_host: "127.0.0.1"

# Testnet v2 chain config + genesis (populated by gqrl role; referenced here)
testnetv2_config_path: "/etc/quantapool/testnetv2-config.yml"
testnetv2_genesis_path: "/etc/quantapool/testnetv2-genesis.ssz"

