global:
  resolve_timeout: 5m

# Alertmanager does not do env-var substitution in this file. To enable Discord
# notifications, replace `null` in the receivers block with a `discord_configs`
# entry containing your webhook URL, then `docker compose restart alertmanager`.
# Example:
#   receivers:
#     - name: critical
#       discord_configs:
#         - webhook_url: https://discord.com/api/webhooks/<ID>/<TOKEN>
#           title: '{{ template "discord.critical.title" . }}'
#           message: '{{ template "discord.critical.message" . }}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 4h
    - match:
        severity: info
      receiver: 'info'
      repeat_interval: 12h

receivers:
  - name: 'default'
  - name: 'critical'
  - name: 'warning'
  - name: 'info'

# Inhibition rules — suppress noisy downstream alerts when the upstream is known
# to be broken. Alert names here must match the rules in
# prometheus/rules/contract-alerts.yml / validator-alerts.yml / system-alerts.yml.
inhibit_rules:
  # Execution client down → squelch sync / peer alerts
  - source_match:
      alertname: GqrlDown
    target_match_re:
      alertname: 'GqrlSyncing|GqrlLowPeers'
    equal: ['instance']

  # Beacon chain down → squelch beacon / validator downstream alerts
  - source_match:
      alertname: BeaconChainDown
    target_match_re:
      alertname: 'BeaconChainNotSynced|BeaconChainLowPeers|ValidatorClientDown|MissedAttestations|BeaconChainStalled'
    equal: ['instance']

  # Validator client down → squelch missed-attestation noise
  - source_match:
      alertname: ValidatorClientDown
    target_match:
      alertname: MissedAttestations
    equal: ['instance']

  # Contract exporter down → squelch all contract-derived alerts
  - source_match:
      alertname: ContractExporterDown
    target_match_re:
      alertname: 'ExchangeRateAnomaly|DepositPoolPaused|StQRLPaused|ValidatorThresholdApproaching|ValidatorThresholdReached|WithdrawalReserveUnderfunded|SlashingDetected|TVLValidatorMismatch|HighRPCErrorRate'
    equal: ['instance']

  # Node exporter down → squelch all system-resource alerts
  - source_match:
      alertname: NodeExporterDown
    target_match_re:
      alertname: 'HighCPUUsage|CriticalCPUUsage|HighMemoryUsage|CriticalMemoryUsage|DiskSpaceWarning|DiskSpaceCritical|HighDiskIOWait|HighSystemLoad'
    equal: ['instance']
